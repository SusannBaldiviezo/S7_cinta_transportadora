# ================================================================
# Mosquitto MQTT Broker — Configuración
# Proyecto: Sistema Clasificador de Frutas
#
# Copiar a: /etc/mosquitto/mosquitto.conf en la RPi
# Aplicar:  sudo systemctl restart mosquitto
# ================================================================

# Puerto estándar MQTT
listener 1883

# Permitir conexiones sin autenticación (red local privada)
allow_anonymous true

# Persistencia de mensajes entre reinicios
persistence true
persistence_location /var/lib/mosquitto/

# Log (descomentar para debugging)
# log_dest file /var/log/mosquitto/mosquitto.log
# log_type error warning notice information
