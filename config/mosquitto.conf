# Configuración Mosquitto MQTT Broker
# Archivo: /etc/mosquitto/mosquitto.conf en la Raspberry Pi
#
# Aplicar cambios: sudo systemctl restart mosquitto

# Puerto estándar MQTT
listener 1883

# Permitir conexiones sin autenticación (red local privada)
# ADVERTENCIA: no usar en redes públicas o producción
allow_anonymous true

# Log de conexiones (opcional, útil para debugging)
# log_dest file /var/log/mosquitto/mosquitto.log
# log_type all
